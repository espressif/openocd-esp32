# Source the ESP common configuration file.
source [find target/esp_common.cfg]

# Target specific global variables
set _CHIPNAME                   "esp32s31"
set _CHIP_LP_NAME               $_CHIPNAME.lp
set _CHIP_HP_NAME               $_CHIPNAME.hp
set _CPUTAPID                   0x00020C25
set _LP_TAPID                   0x00003C25
# Set to 1 if the LP TAP is first in the JTAG chain, 0 if HP TAP is first
set _LP_TAP_FIRST               1
set _ESP_SMP_TARGET             1
set _ESP_ARCH                   "riscv"
# _ONLYCPU can be set in LP core config file which includes this one
if { ![info exists _ONLYCPU] } {
	set _ONLYCPU                0x03
}
if { $_ONLYCPU == 0x1 } {
	set _ESP_SMP_TARGET 0
}
set _LP_TAPNUM                  1
set _HP_TAPNUM                  1
set _ESP_EFUSE_MAC_ADDR_REG     0x20715050

# Set workarea address and size
set _WA_ADDR                0x2F000000
set _WA_SIZE                0x24000

# Target specific functions should be implemented for each riscv chips.
proc esp32s31_wdt_disable { } {
	# Halt event can occur during config phase (before "init" is done).
	# Ignore it since mww commands don't work at that time.
	if { [string compare [command mode] config] == 0 } {
		return
	}

	# Disable Timer Group 0 WDT
	mww 0x20580064 0x50D83AA1
	mww 0x20580048 0
	# Clear TG0 wdt interrupt state
	mww 0x2058007C 0x2

	# Disable Timer Group 1 WDT
	mww 0x20581064 0x50D83AA1
	mww 0x20581048 0
	# Clear TG1 wdt interrupt state
	mww 0x2058107C 0x2

	# Disable LP_WDT_RTC
	mww 0x20801018 0x50D83AA1
	mww 0x20801000 0
	# Disable LP_WDT_SWD
	mww 0x20801020 0x50D83AA1
	mww 0x2080101c 0x40000000

	# Clear LP_WDT_RTC and LP_WDT_SWD interrupt states
	mww 0x20801030 0xC0000000
}

proc esp32s31_soc_reset { } {
	global _RISCV_DMCONTROL _RISCV_SB_CS _RISCV_SB_ADDR0 _RISCV_SB_DATA0 _TARGETNAME_0

	riscv dmi_write $_RISCV_DMCONTROL       0x80000001
	riscv dmi_write $_RISCV_SB_CS           0x40000

	# Unstall both CPUs
	# PMU_CPU_STALL_SW_REG: HPCORE0_SW_STALL_CODE[31:24] | HPCORE1_SW_STALL_CODE[23:16] = 0xFF
	riscv dmi_write $_RISCV_SB_ADDR0        0x207041ec
	riscv dmi_write $_RISCV_SB_DATA0        0xFFFF0000

	# Pulse HP core SW reset via LP_CLKRST (LP_AONCLKRST), same as cpu_utility_ll_reset_cpu().
	# HPCORE0: LP_AONCLKRST_HPCORE0_RESET_CTRL_REG @ 0x2070103c — HPCORE0_SW_RESET bit 20
	riscv dmi_write $_RISCV_SB_CS           0x140000
	riscv dmi_write $_RISCV_SB_ADDR0        0x2070103c
	set _lp0 [riscv dmi_read $_RISCV_SB_DATA0]
	riscv dmi_write $_RISCV_SB_CS           0x40000
	riscv dmi_write $_RISCV_SB_ADDR0        0x2070103c
	riscv dmi_write $_RISCV_SB_DATA0        [expr { $_lp0 | (1 << 20) }]

	# HPCORE1: LP_AONCLKRST_HPCORE1_RESET_CTRL_REG @ 0x20701040 — HPCORE1_SW_RESET bit 20
	riscv dmi_write $_RISCV_SB_CS           0x140000
	riscv dmi_write $_RISCV_SB_ADDR0        0x20701040
	set _lp1 [riscv dmi_read $_RISCV_SB_DATA0]
	riscv dmi_write $_RISCV_SB_CS           0x40000
	riscv dmi_write $_RISCV_SB_ADDR0        0x20701040
	riscv dmi_write $_RISCV_SB_DATA0        [expr { $_lp1 | (1 << 20) }]

	# Wait for the reset to happen
	sleep 10
	poll

	esp32s31_wdt_disable

	# Here debugger reads anyhalted and allhalted bits as set (0x3a2)
	# We will clean allhalted state by resuming the core.
	riscv dmi_write $_RISCV_DMCONTROL       0x40000001

	# Put the hart back into reset state. Note that we need to keep haltreq set.
	riscv dmi_write $_RISCV_DMCONTROL       0x80000003
}

proc esp32s31_memprot_is_enabled { } {
	set RAM_LOW     0x2F000000
	set RAM_HIGH    0x2F080000

	return [pmp_check_region_protected $RAM_LOW $RAM_HIGH]
}

create_esp_target $_ESP_ARCH
