# Source the ESP common configuration file.
source [find target/esp_common.cfg]

# Target specific global variables
set _CHIPNAME                   "esp32s31"
set _CHIP_LP_NAME               $_CHIPNAME.lp
set _CHIP_HP_NAME               $_CHIPNAME.hp
set _CPUTAPID                   0x00020C25
set _LP_TAPID                   0x00003C25
# Set to 1 if the LP TAP is first in the JTAG chain, 0 if HP TAP is first
set _LP_TAP_FIRST               1
set _ESP_SMP_TARGET             1
set _ESP_ARCH                   "riscv"
# _ONLYCPU can be set in LP core config file which includes this one
if { ![info exists _ONLYCPU] } {
	set _ONLYCPU                0x03
}
if { $_ONLYCPU == 0x1 } {
	set _ESP_SMP_TARGET 0
}
set _LP_TAPNUM                  1
set _HP_TAPNUM                  1
set _ESP_EFUSE_MAC_ADDR_REG     0x20715050

# Set workarea address and size
set _WA_ADDR                0x2F000000
set _WA_SIZE                0x24000

# Target specific functions should be implemented for each riscv chips.
proc esp32s31_wdt_disable { } {
	# Halt event can occur during config phase (before "init" is done).
	# Ignore it since mww commands don't work at that time.
	if { [string compare [command mode] config] == 0 } {
		return
	}

	# Disable Timer Group 0 WDT
	mww 0x20580064 0x50D83AA1
	mww 0x20580048 0
	# Clear TG0 wdt interrupt state
	mww 0x2058007C 0x2

	# Disable Timer Group 1 WDT
	mww 0x20581064 0x50D83AA1
	mww 0x20581048 0
	# Clear TG1 wdt interrupt state
	mww 0x2058107C 0x2

	# Disable LP_WDT_RTC
	mww 0x20801018 0x50D83AA1
	mww 0x20801000 0
	# Disable LP_WDT_SWD
	mww 0x20801020 0x50D83AA1
	mww 0x2080101c 0x40000000

	# Clear LP_WDT_RTC and LP_WDT_SWD interrupt states
	mww 0x20801030 0xC0000000
}

proc esp32s31_soc_reset { } {
	global _RISCV_DMCONTROL _RISCV_SB_CS _RISCV_SB_ADDR0 _RISCV_SB_DATA0 _TARGETNAME_0

	riscv dmi_write $_RISCV_DMCONTROL       0x80000001
	riscv dmi_write $_RISCV_SB_CS           0x40000

	# Unstall both CPUs
	# PMU_CPU_STALL_SW_REG: HPCORE0_SW_STALL_CODE[31:24] | HPCORE1_SW_STALL_CODE[23:16] = 0xFF
	riscv dmi_write $_RISCV_SB_ADDR0        0x207041ec
	riscv dmi_write $_RISCV_SB_DATA0        0xFFFF0000
	sleep 10

	# Trigger a full digital-system reset via LP_SYSTEM_REG_SYS_CTRL_REG.LP_SYSTEM_REG_SYS_SW_RST (bit 1).
	# System Reset: resets the whole digital system, including the LP system.
	riscv dmi_write $_RISCV_SB_CS           0x140000
	riscv dmi_write $_RISCV_SB_ADDR0        0x20700008
	set reg_val [expr {[riscv dmi_read $_RISCV_SB_DATA0] | 0x2}]
	riscv dmi_write $_RISCV_SB_CS           0x40000
	riscv dmi_write $_RISCV_SB_ADDR0        0x20700008
	riscv dmi_write $_RISCV_SB_DATA0        $reg_val

	# Set HP_SYS_CLKRST_HPCORE1_CTRL0_REG.HP_SYS_CLKRST_REG_CORE1_CLIC_CLK_EN and
	# HP_SYS_CLKRST_HPCORE1_CTRL0_REG.HP_SYS_CLKRST_REG_CORE1_CPU_CLK_EN to 1
	riscv dmi_write $_RISCV_SB_ADDR0        0x20587020
	riscv dmi_write $_RISCV_SB_DATA0        0x3

	# Wait for the reset to happen
	sleep 10
	poll

	esp32s31_wdt_disable

	# Here debugger reads anyhalted and allhalted bits as set (0x3a2)
	# We will clean allhalted state by resuming the core.
	riscv dmi_write $_RISCV_DMCONTROL       0x40000001

	# Put the hart back into reset state. Note that we need to keep haltreq set.
	riscv dmi_write $_RISCV_DMCONTROL       0x80000003
}

proc esp32s31_memprot_is_enabled { } {
	set RAM_LOW     0x2F000000
	set RAM_HIGH    0x2F080000

	return [pmp_check_region_protected $RAM_LOW $RAM_HIGH]
}

create_esp_target $_ESP_ARCH

set target_names "$_TARGETNAME_0"
if { $_ONLYCPU & 0x2 } {
	set CLKRST_HPCORE1_CTRL0_REG    0x20587020

	# Release CPU1 from reset
	$_TARGETNAME_1 configure -event examine-start {
		global _TARGETNAME_0 CLKRST_HPCORE1_CTRL0_REG
		targets $_TARGETNAME_0
		# HP_SYS_CLKRST_HPCORE1_CTRL0_REG = HP_SYS_CLKRST_REG_CORE1_CPU_CLK_EN | HP_SYS_CLKRST_REG_CORE1_CLIC_CLK_EN
		reg_set $CLKRST_HPCORE1_CTRL0_REG 0x3
		# HP_SYS_CLKRST_CORE1_CPU_CLK_EN &= ~HP_SYS_CLKRST_REG_CORE1_GLOBAL_RST_EN
		reg_clear $CLKRST_HPCORE1_CTRL0_REG 0x4
	}

	set target_names "$_TARGETNAME_0 $_TARGETNAME_1"
}

foreach tgt $target_names {
	$tgt riscv expose_csrs 3008=pma_cfg0
	$tgt riscv expose_csrs 3009=pma_cfg1
	$tgt riscv expose_csrs 3010=pma_cfg2
	$tgt riscv expose_csrs 3011=pma_cfg3
	$tgt riscv expose_csrs 3012=pma_cfg4
	$tgt riscv expose_csrs 3013=pma_cfg5
	$tgt riscv expose_csrs 3014=pma_cfg6
	$tgt riscv expose_csrs 3015=pma_cfg7
	$tgt riscv expose_csrs 3016=pma_cfg8
	$tgt riscv expose_csrs 3017=pma_cfg9
	$tgt riscv expose_csrs 3018=pma_cfg10
	$tgt riscv expose_csrs 3019=pma_cfg11
	$tgt riscv expose_csrs 3020=pma_cfg12
	$tgt riscv expose_csrs 3021=pma_cfg13
	$tgt riscv expose_csrs 3022=pma_cfg14
	$tgt riscv expose_csrs 3023=pma_cfg15
	$tgt riscv expose_csrs 3024=pma_addr0
	$tgt riscv expose_csrs 3025=pma_addr1
	$tgt riscv expose_csrs 3026=pma_addr2
	$tgt riscv expose_csrs 3027=pma_addr3
	$tgt riscv expose_csrs 3028=pma_addr4
	$tgt riscv expose_csrs 3029=pma_addr5
	$tgt riscv expose_csrs 3030=pma_addr6
	$tgt riscv expose_csrs 3031=pma_addr7
	$tgt riscv expose_csrs 3032=pma_addr8
	$tgt riscv expose_csrs 3033=pma_addr9
	$tgt riscv expose_csrs 3034=pma_addr10
	$tgt riscv expose_csrs 3035=pma_addr11
	$tgt riscv expose_csrs 3036=pma_addr12
	$tgt riscv expose_csrs 3037=pma_addr13
	$tgt riscv expose_csrs 3038=pma_addr14
	$tgt riscv expose_csrs 3039=pma_addr15
}
