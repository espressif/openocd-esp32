#
# Espressif builtin USB-JTAG adapter
#

adapter driver esp_usb_jtag

espusbjtag vid_pid 0x303a 0x1001
espusbjtag caps_descriptor 0x2000

#max speed
adapter speed 40000

transport select jtag

if { [info exists env(OPENOCD_USB_ADAPTER_LOCATION)] } {
	echo "Deprecated! use 'adapter usb location <location>' command"
	echo " instead of OPENOCD_USB_ADAPTER_LOCATION variable"
	adapter usb location $env(OPENOCD_USB_ADAPTER_LOCATION)
}
