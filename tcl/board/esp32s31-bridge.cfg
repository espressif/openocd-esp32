#
# Example OpenOCD configuration file for ESP32-S31 connected via USB bridge adapter.
#
# For example, OpenOCD can be started for ESP32-S31 debugging on
#
#   openocd -f board/esp32s31-bridge.cfg
#

# Source the JTAG interface configuration file
source [find interface/esp_usb_bridge.cfg]
# ESP32-S31 chip id defined in the idf esp_chip_model_t
espusbjtag chip_id 32
# Source the ESP32-S31 configuration file
source [find target/esp32s31.cfg]
