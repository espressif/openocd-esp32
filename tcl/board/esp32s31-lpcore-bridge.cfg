#
# Example OpenOCD configuration file for ESP32-S31 LP core connected via USB bridge adapter.
#
#   openocd -f board/esp32s31-lpcore-bridge.cfg
#
# Source the JTAG interface configuration file
source [find interface/esp_usb_bridge.cfg]
# ESP32-S31 chip id defined in the idf esp_chip_model_t
espusbjtag chip_id 32
# Source the ESP32-S31 LP core configuration file
source [find target/esp32s31-lpcore.cfg]
