build_nuttx_app:
  stage: build_nuttx
  trigger:
    project: idf/apache/incubator-nuttx
    branch: master
    strategy: depend
  allow_failure: true
  needs: []
  variables:
    CI_BOARD_FILTER: "esp32-devkitc esp32s2-saola-1 esp32s3-devkit esp32c3-devkit esp32c6-devkitc esp32h2-devkit esp32p4-function-ev-board"
    CI_ESP_APPS_TEST_FILTER: "openocd"
    CI_SKIP_MAIN_CI: "true"
    CI_SKIP_QEMU_TESTS: "true"
    CI_SKIP_HW_TESTS: "true"
    CI_SKIP_SMOKE_TEST: "true"
    CI_SAVE_ELF_AND_MAP: "true"

# nuttx build environment is nuttx/build-env-v5.5
.test_nuttx_template:
  extends: .tests_v5.5.x_template
  stage: test_nuttx
  allow_failure: true
  variables:
    RUNNER_SCRIPT_TIMEOUT: 5m
    TEST_RUN_DIR: "build_test_app_${CHIP_NAME}_nuttx_test"
    NUTTX_APP_NAME: "nuttx_openocd"
    OOCD_CMDS: "set ESP_RTOS nuttx,set ESP_ONLYCPU 1"
    IDF_RELEASE_TAG: "other"
    TEST_RUN_BOARD_OPTS: "-b ${TEST_BOARD} -p test_nuttx -e *.*Encrypted"
  artifacts:
    paths:
      - $TEST_RUN_DIR/debug_backend_tests.log
      - $TEST_RUN_DIR/esp_cov_files
      - $TEST_RUN_DIR/sanitizer_errors.log
    reports:
      junit:
        - $TEST_RUN_DIR/results/*
    when: always
    expire_in: 1 week
  needs:
    - job: build_linux_arm64_test
    - job: build_linux_armhf_test
    - job: build_nuttx_app
      artifacts: false
    - project: idf/apache/incubator-nuttx
      job: "${NUTTX_BOARD} custom-config 1/1"
      ref: master
      artifacts: true
  script:
    - !reference [.export_toolchain, script]
    - mkdir -p $TEST_RUN_DIR/$NUTTX_APP_NAME
    - !reference [.copy_nuttx_files, script]
    - !reference [.run_tests_linux, script]

.test_nuttx_riscv_template:
  extends: .test_nuttx_template
  variables:
    TOOLCHAIN_PREFIX: "riscv32-esp"
    ESP_GDB_TOOLCHAIN: "${ESP_V5_5X_RISCV_GDB_TOOLCHAIN}"
    CHIP_TEST_TOOLCHAIN: "riscv32-esp"

test_nuttx_esp32:
  extends:
    - .test_nuttx_template
  variables:
    CHIP_NAME: esp32
    NUTTX_BOARD: "esp32-devkitc"
    TEST_BOARD: "esp32-wrover-kit-3.3v"

test_nuttx_esp32s2:
  extends:
    - .test_nuttx_template
  variables:
    CHIP_NAME: esp32s2
    NUTTX_BOARD: "esp32s2-saola-1"
    TEST_BOARD: "esp32s2-devkitj"

test_nuttx_esp32s3:
  extends:
    - .test_nuttx_template
  variables:
    CHIP_NAME: esp32s3
    NUTTX_BOARD: "esp32s3-devkit"
    TEST_BOARD: "esp32s3-ftdi"

test_nuttx_esp32c3:
  extends:
    - .test_nuttx_riscv_template
  variables:
    CHIP_NAME: esp32c3
    NUTTX_BOARD: "esp32c3-devkit"
    TEST_BOARD: "esp32c3-ftdi"

test_nuttx_esp32c6:
  extends:
    - .test_nuttx_riscv_template
  tags:
    - esp32c6
    - usb_serial_jtag
  variables:
    CHIP_NAME: esp32c6
    NUTTX_BOARD: "esp32c6-devkitc"
    TEST_BOARD: "esp32c6-builtin"

test_nuttx_esp32h2:
  extends:
    - .test_nuttx_riscv_template
  tags:
    - esp32h2
    - usb_serial_jtag
  variables:
    CHIP_NAME: esp32h2
    NUTTX_BOARD: "esp32h2-devkit"
    TEST_BOARD: "esp32h2-builtin"

test_nuttx_esp32p4:
  extends:
    - .test_nuttx_riscv_template
  tags:
    - esp32p4
    - usb_serial_jtag
    - eco6
  variables:
    CHIP_NAME: esp32p4
    NUTTX_BOARD: "esp32p4-function-ev-board"
    TEST_BOARD: "esp32p4-builtin"
